name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Every release starts as a prerelease: `releases/latest` ignores
      # prereleases, so the installer keeps serving the previous stable
      # while the binaries build (~6 min) — otherwise `latest` would point
      # at an assetless release and curl|sh installs 404 in that window.
      # finalize-release flips stable tags to full releases once all
      # binaries are attached; -suffix tags (v0.2.0-beta.1) stay prerelease
      # forever. install.sh and install.ps1 are attached here so
      # `releases/latest/download/install.{sh,ps1}` resolve.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease="--prerelease"
          # Notes come from the CHANGELOG.md section release-plz wrote for
          # this version; manual tags without an entry (e.g. betas) fall
          # back to GitHub's auto-generated notes.
          version="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ] && grep -q "^## \[$version\]" CHANGELOG.md; then
            awk -v ver="$version" '
              index($0, "## [" ver "]") == 1 { on = 1; next }
              on && /^## \[/ { exit }
              on { print }
            ' CHANGELOG.md > /tmp/notes.md
            set -- --notes-file /tmp/notes.md
          else
            set -- --generate-notes
          fi
          gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" $prerelease \
              --title "$GITHUB_REF_NAME" "$@"
          gh release upload "$GITHUB_REF_NAME" install.sh install.ps1 --clobber

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # x86_64 darwin cross-compiles on the arm64 runner (macos-13,
          # the last Intel runner label, is retired on GitHub-hosted).
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: churl
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
          checksum: sha256
          archive: churl-$target

  smoke-test-install:
    name: Smoke-test the installer
    needs: build-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      # Exercise the real end-to-end path against the just-built release
      # assets: download archive + checksum, verify, install, run. Catches
      # asset-naming drift between the release action and the installer — e.g.
      # the churl-<t>.sha256 vs churl-<t>.tar.gz.sha256 mismatch that made
      # every install 404 on the checksum step through v0.1.2.
      - name: Install via install.sh from this release
        if: runner.os != 'Windows'
        run: |
          sh install.sh --tag "$GITHUB_REF_NAME" --to "$HOME/.local/bin" --force
          "$HOME/.local/bin/churl" --version

      # Windows runs the PowerShell installer end-to-end against the just-built
      # zip asset, proving install.ps1's download/checksum/extract path and the
      # release action's asset naming agree.
      - name: Install via install.ps1 from this release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = Join-Path $env:USERPROFILE 'churl-bin'
          pwsh install.ps1 -Tag $env:GITHUB_REF_NAME -To $dir -Force
          & (Join-Path $dir 'churl.exe') --version

  finalize-release:
    name: Mark release stable
    # Gated on the smoke test: never promote a release to latest if the
    # installer can't actually install it.
    needs: [build-release, smoke-test-install]
    # Stable tags only — beta/rc tags stay prerelease so `latest` never
    # serves them.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Flip prerelease off
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --latest is required: releases born as prereleases are not
        # re-evaluated for the "latest" marker when the flag is flipped,
        # so releases/latest (and the installer) would keep serving the
        # previous version (observed on v0.1.2).
        run: |
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --prerelease=false --latest
