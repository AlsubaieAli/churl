name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tags with a pre-release suffix (v0.2.0-beta.1) are marked prerelease,
      # so `releases/latest` — and therefore the curl|sh installer — keeps
      # serving the last stable release. install.sh is attached here so
      # `releases/latest/download/install.sh` resolves.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease=""
          case "$GITHUB_REF_NAME" in
            *-*) prerelease="--prerelease" ;;
          esac
          # Notes come from the CHANGELOG.md section release-plz wrote for
          # this version; manual tags without an entry (e.g. betas) fall
          # back to GitHub's auto-generated notes.
          version="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ] && grep -q "^## \[$version\]" CHANGELOG.md; then
            awk -v ver="$version" '
              index($0, "## [" ver "]") == 1 { on = 1; next }
              on && /^## \[/ { exit }
              on { print }
            ' CHANGELOG.md > /tmp/notes.md
            set -- --notes-file /tmp/notes.md
          else
            set -- --generate-notes
          fi
          gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" $prerelease \
              --title "$GITHUB_REF_NAME" "$@"
          gh release upload "$GITHUB_REF_NAME" install.sh --clobber

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # x86_64 darwin cross-compiles on the arm64 runner (macos-13,
          # the last Intel runner label, is retired on GitHub-hosted).
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: churl
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
          checksum: sha256
          archive: churl-$target
