name: PR title

# PRs are squash-merged with the PR title as the commit message, and
# release-plz derives version bumps + CHANGELOG.md from those messages —
# so the title must be a valid conventional commit (see CONTRIBUTING.md).

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
